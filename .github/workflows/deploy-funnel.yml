# Deploy Next.js to GitHub Pages via gh-pages branch

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: funnel/package-lock.json

      - name: Install dependencies
        run: cd funnel && npm ci

      - name: Build
        run: cd funnel && npm run build

      - name: Add SPA fallback
        run: cp funnel/out/index.html funnel/out/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./funnel/out
          publish_branch: gh-pages
          cname: ""
