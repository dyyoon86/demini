name: Build Windows Installer

# 사용법:
#  - 태그 푸시(v1.0.0 등) → .exe 빌드 후 자동으로 GitHub Release에 첨부
#  - 또는 Actions 탭에서 수동 실행(workflow_dispatch) → 빌드 결과를 artifact로 다운로드
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: gemini-cli-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install

      - name: Build Windows installer (.exe)
        run: npm run build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DoGem-Windows-Installer
          path: |
            gemini-cli-app/dist/*.exe
            gemini-cli-app/dist/latest.yml

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gemini-cli-app/dist/*.exe
            gemini-cli-app/dist/*.blockmap
            gemini-cli-app/dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
