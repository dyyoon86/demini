<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Demini - Gemini CLI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard', 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .header {
      background: #1e293b;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #334155;
    }
    .logo { font-size: 1.3rem; font-weight: 900; background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #64748b; font-size: 0.85rem; }
    .status-bar {
      background: #1e293b;
      padding: 8px 20px;
      font-size: 0.8rem;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.checking { background: #fbbf24; animation: pulse 1s infinite; }
    .status-dot.installing { background: #fbbf24; animation: pulse 0.5s infinite; }
    .status-dot.ready { background: #34d399; }
    .status-dot.error { background: #f87171; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .output {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      font-size: 0.9rem;
      line-height: 1.7;
    }
    .output .prompt { color: #38bdf8; margin-top: 12px; }
    .output .response { color: #e2e8f0; margin-bottom: 16px; white-space: pre-wrap; }
    .output .error { color: #f87171; }
    .output .system { color: #64748b; font-style: italic; margin: 8px 0; }
    .input-box {
      display: flex;
      padding: 14px 20px;
      background: #1e293b;
      border-top: 1px solid #334155;
      gap: 10px;
    }
    .prompt-symbol { color: #38bdf8; font-weight: 700; font-size: 1rem; align-self: center; }
    input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #475569;
      border-radius: 10px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      font-family: inherit;
    }
    input:focus { border-color: #38bdf8; }
    input::placeholder { color: #475569; }
    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      border-radius: 10px;
      color: #0f172a;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .welcome {
      color: #64748b;
      text-align: center;
      margin-top: 60px;
      line-height: 1.8;
    }
    .welcome h2 { color: #e2e8f0; margin-bottom: 12px; }
    .install-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
    }
    .install-overlay.hidden { display: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #334155;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .install-text { color: #e2e8f0; font-size: 1rem; }
    .install-log {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 16px;
      max-width: 500px;
      max-height: 120px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">Demini</span>
    <span class="subtitle">Gemini CLI Windows App</span>
  </div>
  <div class="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">확인 중...</span>
  </div>
  <div class="output" id="output">
    <div class="welcome">
      <h2>Demini에 오신 것을 환영합니다</h2>
      <p>Gemini CLI를 윈도우 앱으로 래핑했습니다.<br>질문을 입력하세요. 코딩도 가능합니다.</p>
      <p style="margin-top:16px;color:#475569">무료 · 무제한 · API 키 불필요</p>
    </div>
  </div>
  <div class="input-box">
    <span class="prompt-symbol">❯</span>
    <input type="text" id="input" placeholder="질문을 입력하세요 (예: HTML로 버튼 만들어줘)" autofocus />
    <button id="send" onclick="send()">전송</button>
  </div>

  <!-- 설치 오버레이 -->
  <div class="install-overlay" id="install-overlay">
    <div class="spinner" id="spinner"></div>
    <div class="install-text" id="install-text">Gemini CLI 설치 중...</div>
    <div class="install-log" id="install-log"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const output = document.getElementById('output');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const installOverlay = document.getElementById('install-overlay');
    const installText = document.getElementById('install-text');
    const installLog = document.getElementById('install-log');
    const spinner = document.getElementById('spinner');

    let isProcessing = false;

    // 설치 상태 업데이트
    ipcRenderer.on('install-status', (e, msg) => {
      statusText.textContent = msg;
    });

    ipcRenderer.on('install-log', (e, log) => {
      installLog.textContent += log + '\n';
      installLog.scrollTop = installLog.scrollHeight;
    });

    // 초기 상태 확인
    async function checkStatus() {
      const result = await ipcRenderer.invoke('install-status');
      updateStatus(result.status);
    }

    function updateStatus(status) {
      statusDot.className = 'status-dot ' + status;
      switch(status) {
        case 'checking':
          statusText.textContent = 'Gemini CLI 확인 중...';
          installOverlay.classList.remove('hidden');
          spinner.style.display = 'block';
          installText.textContent = 'Gemini CLI 확인 중...';
          sendBtn.disabled = true;
          break;
        case 'installing':
          statusText.textContent = 'Gemini CLI 설치 중...';
          installOverlay.classList.remove('hidden');
          spinner.style.display = 'block';
          installText.textContent = 'Gemini CLI 설치 중... (최초 1회, 1~3분 소요)';
          sendBtn.disabled = true;
          break;
        case 'ready':
          statusText.textContent = 'Gemini CLI 준비 완료 ✓';
          installOverlay.classList.add('hidden');
          sendBtn.disabled = false;
          input.disabled = false;
          input.focus();
          break;
        case 'error':
          statusText.textContent = '설치 오류 발생';
          installOverlay.classList.remove('hidden');
          spinner.style.display = 'none';
          installText.textContent = 'Gemini CLI 설치 실패. 인터넷 연결을 확인하세요.';
          sendBtn.disabled = true;
          break;
      }
    }

    checkStatus();

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !sendBtn.disabled && !isProcessing) send();
    });

    async function send() {
      const prompt = input.value.trim();
      if (!prompt || isProcessing) return;

      isProcessing = true;
      input.value = '';
      sendBtn.disabled = true;
      updateStatus('ready');
      statusText.textContent = 'Gemini CLI 준비 완료 ✓ (응답 대기 중...)';

      // 프롬프트 표시
      const promptEl = document.createElement('div');
      promptEl.className = 'prompt';
      promptEl.textContent = '❯ ' + prompt;
      output.appendChild(promptEl);

      // 응답 영역
      const respEl = document.createElement('div');
      respEl.className = 'response';
      respEl.textContent = '로딩 중...';
      output.appendChild(respEl);

      output.scrollTop = output.scrollHeight;

      try {
        const result = await ipcRenderer.invoke('gemini', prompt);
        respEl.textContent = result.output || '응답 없음';
        respEl.className = result.error ? 'response error' : 'response';
      } catch (e) {
        respEl.textContent = '오류: ' + e.message;
        respEl.className = 'response error';
      }

      isProcessing = false;
      sendBtn.disabled = false;
      input.focus();
      statusText.textContent = 'Gemini CLI 준비 완료 ✓';
      output.scrollTop = output.scrollHeight;
    }
  </script>
</body>
</html>
