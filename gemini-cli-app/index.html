<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Demini - 코딩 몰라도 나만의 페이지</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard','Segoe UI',sans-serif; background:#0f172a; color:#e2e8f0; display:flex; flex-direction:column; height:100vh; }
    .header { background:#1e293b; padding:14px 20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #334155; }
    .logo { font-size:1.3rem; font-weight:900; background:linear-gradient(135deg,#38bdf8,#818cf8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .subtitle { color:#64748b; font-size:0.85rem; }
    .status-bar { background:#1e293b; padding:8px 20px; font-size:0.8rem; border-bottom:1px solid #334155; display:flex; align-items:center; gap:8px; min-height:38px; }
    .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
    .status-dot.checking,.status-dot.installing { background:#fbbf24; animation:pulse 1s infinite; }
    .status-dot.ready { background:#34d399; } .status-dot.error,.status-dot.need-login { background:#f87171; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .login-btn { margin-left:auto; padding:5px 12px; font-size:.78rem; background:#f59e0b; color:#0f172a; border:none; border-radius:6px; font-weight:700; cursor:pointer; display:none; }

    /* 본문 = 좌(대화) / 우(미리보기) 분할 */
    .main { flex:1; display:flex; min-height:0; }
    .output { width:46%; padding:18px; overflow-y:auto; font-family:'JetBrains Mono','Consolas',monospace; font-size:.86rem; line-height:1.7; border-right:1px solid #334155; }
    .output .prompt { color:#38bdf8; margin-top:12px; }
    .output .response { color:#cbd5e1; margin-bottom:14px; white-space:pre-wrap; }
    .output .error { color:#f87171; }
    .preview { flex:1; display:flex; flex-direction:column; min-width:0; background:#0b1120; }
    .preview-bar { display:flex; align-items:center; gap:8px; padding:8px 14px; background:#1e293b; border-bottom:1px solid #334155; font-size:.8rem; color:#94a3b8; }
    .preview-bar .fname { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
    .pv-btn { padding:5px 12px; font-size:.78rem; border:1px solid #475569; background:#0f172a; color:#e2e8f0; border-radius:6px; cursor:pointer; }
    .pv-btn.primary { background:linear-gradient(135deg,#38bdf8,#818cf8); color:#0f172a; border:none; font-weight:700; }
    .pv-btn:disabled { opacity:.4; cursor:not-allowed; }
    #preview-frame { flex:1; border:0; background:#fff; }
    .preview-empty { flex:1; display:flex; align-items:center; justify-content:center; color:#475569; text-align:center; line-height:1.8; padding:20px; }

    .input-box { display:flex; padding:14px 20px; background:#1e293b; border-top:1px solid #334155; gap:10px; }
    .prompt-symbol { color:#38bdf8; font-weight:700; font-size:1rem; align-self:center; }
    input#input { flex:1; padding:12px 16px; border:1px solid #475569; border-radius:10px; background:#0f172a; color:#e2e8f0; font-size:.95rem; outline:none; }
    input#input:focus { border-color:#38bdf8; }
    input#input::placeholder { color:#475569; }
    button#send { padding:12px 24px; background:linear-gradient(135deg,#38bdf8,#818cf8); border:none; border-radius:10px; color:#0f172a; font-weight:700; font-size:.95rem; cursor:pointer; }
    button#send:disabled { opacity:.4; cursor:not-allowed; }
    .welcome { color:#64748b; text-align:center; margin-top:40px; line-height:1.8; }
    .welcome h2 { color:#e2e8f0; margin-bottom:12px; }
    .install-overlay { position:fixed; inset:0; background:rgba(15,23,42,.95); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; z-index:100; }
    .install-overlay.hidden { display:none; }
    .spinner { width:40px; height:40px; border:3px solid #334155; border-top-color:#38bdf8; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg) } }
    .install-log { background:#0f172a; border:1px solid #334155; border-radius:8px; padding:12px 16px; max-width:520px; max-height:130px; overflow-y:auto; font-family:monospace; font-size:.75rem; color:#64748b; }
    .login-cta { background:#1e293b; border:1px solid #f59e0b; border-radius:8px; padding:14px 18px; max-width:540px; color:#fcd34d; font-size:.85rem; line-height:1.7; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">Demini</span>
    <span class="subtitle">코딩 몰라도 AI한테 시켜서 만드는 나만의 페이지</span>
  </div>
  <div class="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">확인 중...</span>
    <button class="login-btn" id="login-btn" onclick="doLogin()">구글 로그인</button>
  </div>

  <div class="main">
    <div class="output" id="output">
      <div class="welcome">
        <h2>환영합니다 👋</h2>
        <p>만들고 싶은 걸 한국어로 말해보세요.<br>오른쪽에 결과 페이지가 바로 떠요.</p>
        <p style="margin-top:14px;color:#475569">예: "한국어 번역기 페이지 만들어줘"</p>
      </div>
    </div>
    <div class="preview">
      <div class="preview-bar">
        <span class="fname" id="pv-name">미리보기</span>
        <button class="pv-btn primary" id="pv-open" onclick="openInBrowser()" disabled>브라우저에서 열기</button>
        <button class="pv-btn" id="pv-folder" onclick="openFolder()">폴더 열기</button>
      </div>
      <div class="preview-empty" id="pv-empty">결과 페이지가 여기에 미리보기로 떠요.<br>왼쪽에 만들고 싶은 걸 입력해보세요.</div>
      <iframe id="preview-frame" style="display:none"></iframe>
    </div>
  </div>

  <div class="input-box">
    <span class="prompt-symbol">❯</span>
    <input type="text" id="input" placeholder="만들고 싶은 페이지를 입력하세요 (예: 계산기 페이지 만들어줘)" autofocus />
    <button id="send" onclick="send()">전송</button>
  </div>

  <div class="install-overlay" id="install-overlay">
    <div class="spinner" id="spinner"></div>
    <div class="install-text" id="install-text">Gemini CLI 확인 중...</div>
    <div class="install-log" id="install-log"></div>
    <div class="login-cta" id="login-cta" style="display:none">
      처음이라 <b>구글 로그인</b>이 필요해요.<br>
      아래 버튼을 누르면 검은 창이 뜨고 브라우저에서 구글 로그인 화면이 나와요.<br>
      로그인 후 그 검은 창은 닫고, 이 앱에서 다시 입력하면 됩니다.<br>
      <button class="pv-btn primary" style="margin-top:10px" onclick="doLogin()">구글 로그인 시작</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const output = document.getElementById('output');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const installOverlay = document.getElementById('install-overlay');
    const installText = document.getElementById('install-text');
    const installLog = document.getElementById('install-log');
    const spinner = document.getElementById('spinner');
    const loginBtn = document.getElementById('login-btn');
    const loginCta = document.getElementById('login-cta');
    const frame = document.getElementById('preview-frame');
    const pvEmpty = document.getElementById('pv-empty');
    const pvName = document.getElementById('pv-name');
    const pvOpen = document.getElementById('pv-open');

    let isProcessing = false;
    let lastSavedPath = null;

    ipcRenderer.on('install-status', (e, msg) => { statusText.textContent = msg; });
    ipcRenderer.on('install-log', (e, log) => { installLog.textContent += log + '\n'; installLog.scrollTop = installLog.scrollHeight; });

    async function checkStatus() {
      const r = await ipcRenderer.invoke('install-status');
      updateStatus(r.status);
    }
    function updateStatus(status) {
      statusDot.className = 'status-dot ' + status;
      loginBtn.style.display = (status === 'need-login') ? 'inline-block' : 'none';
      switch (status) {
        case 'checking':
          statusText.textContent = 'Gemini CLI 확인 중...';
          installOverlay.classList.remove('hidden'); spinner.style.display = 'block'; loginCta.style.display = 'none';
          installText.textContent = 'Gemini CLI 확인 중...'; sendBtn.disabled = true; break;
        case 'installing':
          statusText.textContent = 'Gemini CLI 설치 중...';
          installOverlay.classList.remove('hidden'); spinner.style.display = 'block'; loginCta.style.display = 'none';
          installText.textContent = 'Gemini CLI 설치 중... (최초 1회, 1~3분 소요)'; sendBtn.disabled = true; break;
        case 'ready':
          statusText.textContent = 'Gemini CLI 준비 완료 ✓';
          installOverlay.classList.add('hidden'); sendBtn.disabled = false; input.disabled = false; input.focus(); break;
        case 'need-login':
          statusText.textContent = '구글 로그인 필요';
          installOverlay.classList.remove('hidden'); spinner.style.display = 'none';
          installText.textContent = ''; loginCta.style.display = 'block'; sendBtn.disabled = true; break;
        case 'error':
          statusText.textContent = '설치 오류 발생';
          installOverlay.classList.remove('hidden'); spinner.style.display = 'none'; loginCta.style.display = 'none';
          installText.textContent = 'Gemini CLI 설치 실패. 인터넷 연결을 확인하세요.'; sendBtn.disabled = true; break;
      }
    }
    checkStatus();

    async function doLogin() {
      await ipcRenderer.invoke('login');
      statusText.textContent = '로그인 창을 띄웠어요. 로그인 후 다시 입력하세요.';
    }
    async function openInBrowser() { if (lastSavedPath) await ipcRenderer.invoke('open-path', lastSavedPath); }
    async function openFolder() { await ipcRenderer.invoke('open-folder'); }

    input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !sendBtn.disabled && !isProcessing) send(); });

    async function send() {
      const prompt = input.value.trim();
      if (!prompt || isProcessing) return;
      isProcessing = true; input.value = ''; sendBtn.disabled = true;
      statusText.textContent = '만드는 중... (10~40초)';

      const pEl = document.createElement('div'); pEl.className = 'prompt'; pEl.textContent = '❯ ' + prompt; output.appendChild(pEl);
      const rEl = document.createElement('div'); rEl.className = 'response'; rEl.textContent = '⏳ 생성 중...'; output.appendChild(rEl);
      output.scrollTop = output.scrollHeight;

      try {
        const result = await ipcRenderer.invoke('gemini', prompt);
        if (result.needLogin) { updateStatus('need-login'); rEl.textContent = '⚠ 구글 로그인이 필요해요. 로그인 버튼을 눌러주세요.'; rEl.className = 'response error'; }
        else {
          rEl.textContent = result.output || '응답 없음';
          rEl.className = result.error ? 'response error' : 'response';
          if (result.saved) showPreview(result.saved);
        }
      } catch (e) { rEl.textContent = '오류: ' + e.message; rEl.className = 'response error'; }

      isProcessing = false; sendBtn.disabled = false; input.focus();
      if (statusText.textContent.startsWith('만드는')) statusText.textContent = 'Gemini CLI 준비 완료 ✓';
      output.scrollTop = output.scrollHeight;
    }

    function showPreview(saved) {
      lastSavedPath = saved.path;
      pvName.textContent = '📄 ' + saved.name + ' — 저장됨';
      pvEmpty.style.display = 'none';
      frame.style.display = 'block';
      frame.srcdoc = saved.html;
      pvOpen.disabled = false;
    }
  </script>
</body>
</html>
