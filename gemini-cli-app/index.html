<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Demini - Gemini CLI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard', 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .header {
      background: #1e293b;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #334155;
    }
    .logo { font-size: 1.3rem; font-weight: 900; background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #64748b; font-size: 0.85rem; }
    .output {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      font-size: 0.9rem;
      line-height: 1.7;
    }
    .output .prompt { color: #38bdf8; margin-top: 12px; }
    .output .response { color: #e2e8f0; margin-bottom: 16px; white-space: pre-wrap; }
    .output .error { color: #f87171; }
    .input-box {
      display: flex;
      padding: 14px 20px;
      background: #1e293b;
      border-top: 1px solid #334155;
      gap: 10px;
    }
    .prompt-symbol { color: #38bdf8; font-weight: 700; font-size: 1rem; align-self: center; }
    input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #475569;
      border-radius: 10px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      font-family: inherit;
    }
    input:focus { border-color: #38bdf8; }
    input::placeholder { color: #475569; }
    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      border-radius: 10px;
      color: #0f172a;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .welcome {
      color: #64748b;
      text-align: center;
      margin-top: 60px;
      line-height: 1.8;
    }
    .welcome h2 { color: #e2e8f0; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">Demini</span>
    <span class="subtitle">Gemini CLI Windows App</span>
  </div>
  <div class="output" id="output">
    <div class="welcome">
      <h2>Demini에 오신 것을 환영합니다</h2>
      <p>Gemini CLI를 윈도우 앱으로 래핑했습니다.<br>질문을 입력하세요. 코딩도 가능합니다.</p>
      <p style="margin-top:16px;color:#475569">무료 · 무제한 · API 키 불필요</p>
    </div>
  </div>
  <div class="input-box">
    <span class="prompt-symbol">❯</span>
    <input type="text" id="input" placeholder="질문을 입력하세요 (예: HTML로 버튼 만들어줘)" autofocus />
    <button id="send" onclick="send()">전송</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const output = document.getElementById('output');

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !sendBtn.disabled) send();
    });

    async function send() {
      const prompt = input.value.trim();
      if (!prompt) return;

      // 프롬프트 표시
      const promptEl = document.createElement('div');
      promptEl.className = 'prompt';
      promptEl.textContent = '❯ ' + prompt;
      output.appendChild(promptEl);

      // 응답 영역
      const respEl = document.createElement('div');
      respEl.className = 'response';
      respEl.textContent = '로딩 중...';
      output.appendChild(respEl);

      input.value = '';
      sendBtn.disabled = true;
      output.scrollTop = output.scrollHeight;

      try {
        const result = await ipcRenderer.invoke('gemini', prompt);
        respEl.textContent = result.output || '응답 없음';
        respEl.className = result.error ? 'response error' : 'response';
      } catch (e) {
        respEl.textContent = '오류: ' + e.message;
        respEl.className = 'response error';
      }

      sendBtn.disabled = false;
      input.focus();
      output.scrollTop = output.scrollHeight;
    }
  </script>
</body>
</html>
